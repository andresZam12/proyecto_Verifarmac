name: veri_farmac
description: "App de verificación de medicamentos colombianos."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.8.4

  # Red
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Almacenamiento local
  shared_preferences: ^2.3.3

  # Scanner
  mobile_scanner: ^6.0.7

  # OCR
  google_mlkit_text_recognition: ^0.13.1

  # Mapas
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Gráficas
  fl_chart: ^0.69.0

  # Utilidades
  uuid: ^4.5.1
  get_it: ^8.0.3
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true